name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      issue_reference: ${{ steps.extract-issue.outputs.issue_reference }}
      conclusion: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci
          npm install -g npm

      - name: Extract issue reference from PR
        id: extract-issue
        if: github.event_name == 'pull_request'
        run: |
          ISSUE_REF=$(echo '${{ github.event.pull_request.body }}' | grep -oE '#[0-9]+' | head -1 || echo "")
          echo "issue_reference=${ISSUE_REF}" >> $GITHUB_OUTPUT

      - name: Run tests
        run: npm test

      - name: Report result
        if: always()
        run: |
          echo "Conclusion: ${{ job.status }}"